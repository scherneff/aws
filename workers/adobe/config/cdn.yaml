kind: "CDN"
version: "1"
data:
  requestTransformations:
    rules:
      - name: rewrite-demo2-llms-txt
        when:
          allOf:
            - reqProperty: domain
              matches: '^(www\.)?demo2\.bbird\.live$'
            - reqProperty: path
              equals: /llms.txt
        actions:
          - type: transform
            op: replace
            reqProperty: path
            match: '^/llms\.txt$'
            replacement: '/llms-txt.md'
  trafficFilters:
    rules:
      - name: block-demo2-path
        when:
          allOf:
            - reqProperty: domain
              equals: "demo2.bbird.live"
            - reqProperty: path
              equals: "/block/me"
        action: block

      - name: block-demo2-test
        when:
          allOf:
            - reqProperty: domain
              equals: "demo2.bbird.live"
            - reqProperty: path
              equals: "/cdn-test"
        action: block
